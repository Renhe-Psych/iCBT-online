    // 全局状态
    let state = {
        user: { name: "", id: "" },
        group: "", 
        round: 1,      
        tableName: "", 
        idx: 0,
        responses: [],
        startTime: 0,
        currentAVObject: null,
        activeQuestions: [] 
    };

    // UI: 选择轮次
    function selectRound(r) {
        document.getElementById('round-select').value = r;
        document.getElementById('opt-r1').className = r === 1 ? 'round-option active' : 'round-option';
        document.getElementById('opt-r2').className = r === 2 ? 'round-option active' : 'round-option';
    }

    // 1. 处理登录
    // [更改点 2] 新增校验函数
    function validateID(fullID) {
        fullID = fullID.toUpperCase().trim();

        // 正则规则：开头是字母(姓名) + 中间3位数字 + 结尾1位校验码
        // 这里的正则表达式可以根据需要修改
        const regex = /^([A-Z]+)(\d{3})([A-Z0-9])$/;
        const match = fullID.match(regex);

        if (!match) return { valid: false, msg: "格式错误，应为：姓名首字母+3位数字+校验码" };

        const namePart = match[1];   // 例如 ZS
        const numPart = match[2];    // 例如 101
        const inputCode = match[3];  // 用户填写的校验码，例如 X
        
        const baseStr = namePart + numPart; // 用来计算校验码的基础字符串，例如 ZS101

        // ==========================================
        // ★★★ 请在此处修改你的校验码计算公式 ★★★
        // ==========================================
        let calculatedCode = "";
        
        // --- 示例算法（请删除并替换为你自己的）---
        // 假设算法是：(所有字符ASCII码之和) % 10
        let sum = 0;
        for (let i = 0; i < baseStr.length; i++) {
            sum += baseStr.charCodeAt(i);
        }
        calculatedCode = (sum % 10).toString(); 
        // ---------------------------------------

        // 比对计算结果和用户输入是否一致
        if (inputCode !== calculatedCode) {
            return { valid: false, msg: `校验码错误！` };
        }

        return { valid: true, number: parseInt(numPart), cleanID: fullID };
    }

    async function handleLogin() {
        const name = document.getElementById('username').value.trim();
        const rawId = document.getElementById('userid').value.trim();
        const btn = document.getElementById('loginBtn');
        const errorEl = document.getElementById('id-error');
        
        // 获取当前选中的轮次
        const roundVal = parseInt(document.getElementById('round-select').value);

        // 1. 调用校验函数
        const check = validateID(rawId);

        // 2. 校验失败处理
        if (!check.valid) {
            errorEl.innerText = check.msg;
            errorEl.style.display = 'block';
            return; 
        } else {
            errorEl.style.display = 'none';
        }

        if (!dbReady) return alert("数据库未配置");

        btn.disabled = true;
        btn.innerText = "正在初始化...";

        // 3. 更新全局状态
        state.user.name = name;
        // ★★★ 关键点：这里存的是校验后的干净ID (如 ZS101A)
        state.user.id = check.cleanID; 
        state.round = roundVal;

        // 4. 根据编号数字分组 (奇数=exp, 偶数=con)
        if (check.number % 2 !== 0) {
            state.group = 'exp'; 
        } else {
            state.group = 'con';
        }

        // 5. 根据轮次，决定用哪套题、存哪个表
        if (state.round === 1) {
            // 第一轮：ID 为奇数
            state.activeQuestions = allQuestions.filter(q => q.id % 2 !== 0);
            state.tableName = "ExpData_R1"; 
        } else {
            // 第二轮：ID 为偶数
            state.activeQuestions = allQuestions.filter(q => q.id % 2 === 0);
            state.tableName = "ExpData_R2";
        }

        console.log(`用户:${state.user.id}, 组别:${state.group}, 轮次:${state.round}, 表:${state.tableName}`);

        // 6. 云端查询逻辑
        try {
            const query = Bmob.Query(state.tableName);
            query.equalTo("userId", "==", state.user.id);
            const records = await query.find();

            if (records.length > 0) {
                // 老用户恢复
                const record = records[0]; // Bmob 返回的是数组
                state.currentAVObject = record; 
                state.responses = record.data || [];
                state.idx = state.responses.length; 
                state.startTime = Date.now() - ((record.duration || 0) * 1000);
                
                if (state.idx >= state.activeQuestions.length) {
                    alert(`您已完成第 ${state.round} 轮的所有练习！`);
                    finish();
                    return;
                }
                alert(`欢迎回来！第 ${state.round} 轮练习将从第 ${state.idx + 1} 题继续。`);
            } else {
                // 新用户创建
                const insertQuery = Bmob.Query(state.tableName);
                insertQuery.set('name', name);
                insertQuery.set('userId', state.user.id);
                insertQuery.set('group', state.group);
                insertQuery.set('round', state.round); 
                insertQuery.set('data', []);
                insertQuery.set('finished', false);
                insertQuery.set('duration', 0);
                
                // 保存并记录返回的 objectId (后续更新需要用到)
                const res = await insertQuery.save();
                state.currentAVObject = { objectId: res.objectId };
                state.startTime = Date.now();
            }

            // 切换界面
            document.getElementById('page-login').classList.add('hidden');
            document.getElementById('page-game').classList.remove('hidden');
            renderQ();

        } catch (error) {
            console.error("Login Error:", error);
            alert(`启动失败：请检查网络或联系研究者。`);
            btn.disabled = false;
            btn.innerText = "开始 / 继续练习";
        }
    }


    // 2. 渲染题目
    function renderQ() {
        if (state.idx >= state.activeQuestions.length) return finish();

        const q = state.activeQuestions[state.idx];
        state.startTime = Date.now();
        document.getElementById('progress-text').innerText = `进度: ${state.idx + 1} / ${state.activeQuestions.length}`;
        document.getElementById('q-text').innerText = q.text;
        
        const btnA = document.getElementById('btnA');
        const btnB = document.getElementById('btnB');
        
        btnA.innerText = "A. " + q.optionA;
        btnB.innerText = "B. " + q.optionB;
        btnA.disabled = false; btnB.disabled = false;
        btnA.style.background = "#fff"; btnA.style.borderColor = "#ddd";
        btnB.style.background = "#fff"; btnB.style.borderColor = "#ddd";
        
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('next-box').classList.add('hidden');
    }

    // 3. 答题逻辑
    function answer(choice) {
        const q = state.activeQuestions[state.idx];
        const currentTime = Date.now()
        const rt = currentTime - state.startTime;
        state.responses.push({
            qid: q.id, 
            choice: choice,
            ts: currentTime,
            rt: rt,
            recall: null 
        });

        // 2. 反应过快监测逻辑
        if (state.responses.length >= 3) {
            // 获取最后 3 条记录的反应时
            const last3RT = state.responses.slice(-3).map(r => r.rt);
            // 如果连续 3 题都小于 800 毫秒
            if (last3RT.every(time => time < 800)) {
                alert("我们注意到您最近的作答速度非常快。\n\n为确保练习效果，请您放慢速度，仔细阅读情境并想象自己身处其中，然后再做出选择。这对本次练习非常重要。");
            }
        }

        document.getElementById('btnA').disabled = true;
        document.getElementById('btnB').disabled = true;

        syncToCloud();

        if (state.group === 'con') {
            showFeedback("收到，已记录。", false);
            showNextBtn();
            return;
        }

        const isCorrect = (choice === q.positive);
        const targetBtn = document.getElementById('btn' + choice);
        
        if (isCorrect) {
            targetBtn.style.background = "#f0f9eb";
            targetBtn.style.borderColor = "#07c160";
            showFeedback(q.fbPos, false);
            showNextBtn();
        } else {
            targetBtn.style.background = "#fffbe6";
            targetBtn.style.borderColor = "#faad14";
            showFeedback(q.fbNeg + "<br><strong>请问是否回忆成功？</strong>", true);
            
            document.getElementById('next-box').innerHTML = `
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn btn-primary" style="margin:0" onclick="handleRecall(true)">是的</button>
                    <button class="btn btn-outline" style="margin:0" onclick="handleRecall(false)">没有</button>
                </div>
            `;
            document.getElementById('next-box').classList.remove('hidden');
        }
    }

    function handleRecall(success) {
        const lastIndex = state.responses.length - 1;
        state.responses[lastIndex].recall = success;
        syncToCloud();
        next();
    }

    function showFeedback(html, isNeg) {
        const box = document.getElementById('feedback-box');
        box.innerHTML = html;
        box.className = isNeg ? "feedback neg" : "feedback";
        box.style.display = "block";
    }

    function showNextBtn() {
        document.getElementById('next-box').innerHTML = `<button class="btn btn-primary" onclick="next()">下一题</button>`;
        document.getElementById('next-box').classList.remove('hidden');
    }

    function next() {
        state.idx++;
        renderQ();
    }

    // 4. 云同步
    async function syncToCloud(isFinal = false) {
        if (!state.currentAVObject || !state.currentAVObject.objectId) return;
        const statusEl = document.getElementById('save-status');
        statusEl.style.display = 'block';

        try {
            const updateQuery = Bmob.Query(state.tableName);
            // Bmob 更新数据必须指定具体的 objectId
            updateQuery.set('id', state.currentAVObject.objectId);
            updateQuery.set('data', state.responses);
            updateQuery.set('duration', Math.floor((Date.now() - state.startTime)/1000));
            if (isFinal) updateQuery.set('finished', true);

            await updateQuery.save();
            setTimeout(() => { statusEl.style.display = 'none'; }, 500);
        } catch (error) {
            console.error("同步失败", error);
            statusEl.innerText = "⚠️ 保存失败，正在重试...";
            setTimeout(() => syncToCloud(isFinal), 3000);
        }
    }


    function showEndPage() {
        document.getElementById('page-game').classList.add('hidden');
        
        let endTitle = "";
        let endContent = "";

        // 根据 state.group 判断结束语内容
        if (state.group === 'exp') {
            // 实验组：强调积极干预、认知重构和成长
            endTitle = "🎉 练习达成：开启积极视角";
            endContent = `
                练习已完成，感谢你的认真参与！<br>
                在刚才的练习中，你尝试了从不同角度理解情境。希望你感受到，选择积极的信念可以带来更轻松的心态。<br>
                生活中的情境常常有多种解读方式，试着多给自己一些积极肯定的空间。<br>
                <strong>再次感谢你的贡献，祝你拥有愉快的一天！</strong>
            `;
        } else {
            // 控制组：强调任务完成、科学贡献和日常状态
            endTitle = "✅ 练习完成：感谢参与";
            endContent = `
                练习已完成，感谢你的认真参与！<br>
                你已完成了所有情境选择，你的反馈对我们非常重要。<br>
                本研究旨在探索信念与解释方式之间的关系，你的参与为科学进步贡献了宝贵数据。<br>
                <strong>再次感谢你的时间与配合！</strong>
            `;
        }

        const endPageHTML = `
            <div id="page-end" style="text-align: center; padding: 20px 0; animation: fadeIn 0.8s;">
                <h1 style="color: var(--primary); margin-bottom: 20px;">${endTitle}</h1>
                <p style="font-size: 15px; line-height: 1.8; color: #555; margin-bottom: 30px; text-align: left; background: #f9f9f9; padding: 20px; border-radius: 10px;">
                    ${endContent}
                </p>
                <button class="btn btn-primary" onclick="location.reload()" style="width: auto; padding: 12px 40px;">回到首页</button>
            </div>
        `;
        
        const container = document.querySelector('.container');
        container.insertAdjacentHTML('beforeend', endPageHTML);
    }
